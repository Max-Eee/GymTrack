allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

rootProject.buildDir = "../build"
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}
subprojects {
    project.evaluationDependsOn(":app")
    // Provide `flutter` property for plugins that reference flutter.compileSdkVersion
    project.ext {
        set("flutter", [
            compileSdkVersion: 35,
            ndkVersion: "25.1.8937393",
            minSdkVersion: 31,
            targetSdkVersion: 35,
            versionCode: 1,
            versionName: "1.0.0",
        ])
    }
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}
